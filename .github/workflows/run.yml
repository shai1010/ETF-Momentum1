name: ETF 动量监控系统

on:
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch: 

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    steps:
      - name: 获取仓库代码
        uses: actions/checkout@v3

      - name: 配置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装量化依赖库
        run: pip install efinance pandas numpy scipy

      - name: 执行 100% 复刻版策略脚本
        run: python main.py
