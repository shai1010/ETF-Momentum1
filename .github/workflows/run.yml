name: ETF 动量监控系统

on:
  schedule:
    # 每天北京时间下午 15:30 运行 (UTC时间 07:30)
    - cron: '30 7 * * *'
  workflow_dispatch: # 允许手动点击运行

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    steps:
      - name: 获取代码
        uses: actions/checkout@v3

      - name: 配置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装量化依赖库
        run: pip install akshare pandas

      - name: 执行策略脚本并输出信号
        run: python main.py
