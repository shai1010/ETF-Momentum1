name: ETF 动量监控系统

on:
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch:

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    steps:
      - name: 获取代码
        uses: actions/checkout@v3

      - name: 配置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装量化依赖库
        # 这里多装了一个 efinance，它比 akshare 在云端更稳
        run: pip install efinance pandas

      - name: 执行策略脚本并输出信号
        run: python main.py
